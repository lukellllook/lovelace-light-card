<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entity Controller Card Preview</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      background-color: #f5f5f5;
      min-height: 100vh;
    }

    body.dark {
      background-color: #121212;
      color: #ffffff;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      color: #333;
    }

    body.dark h1 {
      color: #fff;
    }

    .preview-container {
      max-width: 400px;
      margin: 0 auto 32px;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background-color: #03a9f4;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .theme-toggle:hover {
      background-color: #0288d1;
    }

    .section-title {
      text-align: center;
      color: #666;
      margin-bottom: 16px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    body.dark .section-title {
      color: #aaa;
    }

    :root {
      --card-background-color: #ffffff;
      --primary-text-color: #212121;
      --secondary-text-color: #757575;
      --primary-color: #03a9f4;
      --success-color: #4caf50;
      --disabled-color: #9e9e9e;
      --surface-color: #f5f5f5;
      --error-color: #f44336;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>

  <h1>Entity State Card</h1>

  <div style="max-width: 800px; margin: 0 auto 32px; display: flex; gap: 24px; flex-wrap: wrap;">
    <div style="flex: 1; min-width: 300px;">
      <h2 style="text-align: center; color: #666; margin-bottom: 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Card Preview</h2>
      <div class="preview-container">
        <div class="section-title">Light (On)</div>
        <entity-state-card id="card-entity-state-light-on"></entity-state-card>
      </div>

      <div class="preview-container">
        <div class="section-title">Light (Off)</div>
        <entity-state-card id="card-entity-state-light-off"></entity-state-card>
      </div>

      <div class="preview-container">
        <div class="section-title">Lock (Locked)</div>
        <entity-state-card id="card-entity-state-lock"></entity-state-card>
      </div>

      <div class="preview-container">
        <div class="section-title">Custom</div>
        <entity-state-card id="card-entity-state-custom"></entity-state-card>
      </div>
    </div>

    <div style="flex: 1; min-width: 300px;">
      <h2 style="text-align: center; color: #666; margin-bottom: 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Config Editor</h2>
      <entity-state-card-editor id="card-editor"></entity-state-card-editor>
    </div>
  </div>

  <script type="module" src="./dist/entity-controller.js"></script>
  <script>
    const mockHass = {
      states: {
        'light.living_room': {
          entity_id: 'light.living_room',
          state: 'on',
          attributes: {
            friendly_name: 'Living Room Light',
            brightness: 180,
            supported_features: 1
          },
          last_changed: new Date().toISOString(),
          last_updated: new Date().toISOString(),
          context: { id: 'mock' }
        },
        'light.bedroom': {
          entity_id: 'light.bedroom',
          state: 'off',
          attributes: {
            friendly_name: 'Bedroom Light',
            brightness: 0
          },
          last_changed: new Date().toISOString(),
          last_updated: new Date().toISOString(),
          context: { id: 'mock' }
        },
        'lock.front_door': {
          entity_id: 'lock.front_door',
          state: 'locked',
          attributes: {
            friendly_name: 'Front Door Lock'
          },
          last_changed: new Date().toISOString(),
          last_updated: new Date().toISOString(),
          context: { id: 'mock' }
        }
      },
      callService: (domain, service, data) => {
        console.log('Service called:', domain, service, data);
        return Promise.resolve();
      }
    };

    function toggleTheme() {
      document.body.classList.toggle('dark');
      const cards = document.querySelectorAll('entity-state-card');
      cards.forEach(card => {
        if (document.body.classList.contains('dark')) {
          card.setAttribute('dark', '');
        } else {
          card.removeAttribute('dark');
        }
      });
    }

    function initCards() {
      const entityStateCards = {
        'card-entity-state-light-on': { entity: 'light.living_room', show_state: true },
        'card-entity-state-light-off': { entity: 'light.bedroom', show_state: true },
        'card-entity-state-lock': { entity: 'lock.front_door', show_state: true },
        'card-entity-state-custom': { entity: 'light.living_room', name: 'Custom Title', icon: '💡', show_state: true }
      };

      Object.entries(entityStateCards).forEach(([id, config]) => {
        const card = document.getElementById(id);
        if (card && 'setConfig' in card) {
          card.hass = mockHass;
          card.setConfig(config);
        }
      });
    }

    function initEditor() {
      const editor = document.getElementById('card-editor');
      if (editor && 'setConfig' in editor) {
        editor.setConfig({
          entity: 'light.living_room',
          name: '',
          icon: '',
          show_state: true,
          tap_action: {
            action: 'more-info',
            entity: 'light.living_room'
          }
        });
        editor.hass = mockHass;
      }
    }

    function handleConfigChanged(event) {
      const newConfig = event.detail.config;
      const previewCard = document.getElementById('card-entity-state-custom');
      if (previewCard && 'setConfig' in previewCard) {
        previewCard.setConfig(newConfig);
        previewCard.hass = mockHass;
      }
    }

    customElements.whenDefined('entity-state-card').then(() => {
      console.log('EntityStateCard registered, initializing...');
      initCards();
    });

    customElements.whenDefined('entity-state-card-editor').then(() => {
      console.log('EntityStateCardEditor registered, initializing...');
      initEditor();
      const editor = document.getElementById('card-editor');
      if (editor) {
        editor.addEventListener('config-changed', handleConfigChanged);
      }
    });
  </script>
</body>
</html>
